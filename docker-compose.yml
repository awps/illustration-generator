services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./.local-data/caddy/data:/data
      - ./.local-data/caddy/config:/config
    depends_on:
      - api
      - app

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: >
      sh -c "printenv | grep -E '^(COOKIE_DOMAIN|APP_ORIGIN)=' > .env
      && npx wrangler d1 execute illustragen-platform --local --persist-to /app/.local-data --command=\"SELECT 1 FROM platform_users LIMIT 1\" 2>/dev/null
      && echo 'DB already initialized, skipping migrations'
      || { echo 'Running migrations...' && for f in /app/packages/db/drizzle/platform/*.sql; do npx wrangler d1 execute illustragen-platform --local --persist-to /app/.local-data --file=\"$$f\"; done; }
      && npx wrangler dev --port 8787 --ip 0.0.0.0 --persist-to /app/.local-data"
    working_dir: /app/apps/api
    environment:
      - COOKIE_DOMAIN=${COOKIE_DOMAIN}
      - APP_ORIGIN=${APP_ORIGIN}
    volumes:
      - ./packages:/app/packages:ro
      - ./apps/api:/app/apps/api
      - /app/apps/api/node_modules
      - ./.local-data:/app/.local-data
    expose:
      - "8787"

  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: >
      sh -c "printenv | grep -E '^(API_URL|API_INTERNAL_URL|IMAGES_DOMAIN)=' > .env
      && npx vite build
      && (npx vite build --watch &)
      && npx wrangler dev --port 8788 --ip 0.0.0.0 --persist-to /app/.local-data"
    working_dir: /app/apps/app
    environment:
      - API_URL=${API_URL}
      - API_INTERNAL_URL=${API_INTERNAL_URL}
      - IMAGES_DOMAIN=${IMAGES_DOMAIN}
    volumes:
      - ./packages:/app/packages:ro
      - ./apps/app:/app/apps/app
      - /app/apps/app/node_modules
      - ./.local-data:/app/.local-data
    expose:
      - "8788"
